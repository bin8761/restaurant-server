server:
  port: ${PORT:3008}

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/paymentdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

services:
  order: ${ORDER_SERVICE_URL:http://localhost:3003}

payment:
  sepay:
    create-url: ${SEPAY_CREATE_URL:}
    base-url: ${SEPAY_BASE_URL:${SEPAY_API_BASE_URL:https://api.sepay.vn}}
    create-path: ${SEPAY_CREATE_PATH:/v1/payments/create}
    verify-path: ${SEPAY_VERIFY_PATH:/v1/payments/verify}
    userapi-base-url: ${SEPAY_USERAPI_BASE_URL:https://my.sepay.vn}
    userapi-enabled: ${SEPAY_USERAPI_ENABLED:false}
    bank-code: ${SEPAY_BANK_CODE:${SEPAY_BANK_NAME:}}
    bank-account-id: ${SEPAY_BANK_ACCOUNT_ID:${SEPAY_BANK_ACCOUNT:}}
    api-key: ${SEPAY_API_KEY:${SEPAY_API_TOKEN:}}
    webhook-secret: ${SEPAY_WEBHOOK_SECRET:${SEPAY_IPN_API_KEY:}}
    return-url: ${SEPAY_RETURN_URL:}
    timeout-minutes: ${SEPAY_TIMEOUT_MINUTES:15}
    http-connect-timeout-ms: ${SEPAY_HTTP_CONNECT_TIMEOUT_MS:8000}
    http-read-timeout-ms: ${SEPAY_HTTP_READ_TIMEOUT_MS:15000}
    timeout-check-ms: ${SEPAY_TIMEOUT_CHECK_MS:30000}
    retry-sync-ms: ${SEPAY_RETRY_SYNC_MS:45000}
    internal-auth-header: ${SEPAY_INTERNAL_AUTH_HEADER:}

