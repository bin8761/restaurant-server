server:
  port: 3007

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: image-service
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET:restaurant_secret_key_12345678900}
  expiration: ${JWT_EXPIRATION:86400000}

upload:
  dir: uploads
