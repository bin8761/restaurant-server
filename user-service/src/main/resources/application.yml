server:
  port: ${PORT:3005}

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: ${MAIL_HOST:${SMTP_HOST:smtp.mailtrap.io}}
    port: ${MAIL_PORT:${SMTP_PORT:587}}
    username: ${MAIL_USERNAME:${MAIL_USER:${SMTP_USERNAME:${SMTP_USER:}}}}
    password: ${MAIL_PASSWORD:${MAIL_PASS:${SMTP_PASSWORD:${SMTP_PASS:}}}}
    properties:
      mail:
        debug: ${MAIL_DEBUG:false}
        smtp:
          auth: ${MAIL_SMTP_AUTH:${SMTP_AUTH:true}}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:${SMTP_CONNECTION_TIMEOUT_MS:5000}}
          timeout: ${MAIL_TIMEOUT_MS:${SMTP_TIMEOUT_MS:5000}}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:${SMTP_WRITE_TIMEOUT_MS:5000}}
          quitwait: false
          ssl:
            enable: ${MAIL_SSL_ENABLE:${SMTP_SSL_ENABLE:false}}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:${SMTP_STARTTLS_ENABLE:true}}
            required: ${MAIL_STARTTLS_REQUIRED:${SMTP_STARTTLS_REQUIRED:true}}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3011}
  mail:
    fail-on-error: ${APP_MAIL_FAIL_ON_ERROR:true}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
      base-url: ${SENDGRID_API_BASE_URL:https://api.sendgrid.com}
      from: ${SENDGRID_FROM:}
      from-name: ${SENDGRID_FROM_NAME:Nha Hang}
      connect-timeout-ms: ${SENDGRID_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${SENDGRID_READ_TIMEOUT_MS:10000}

