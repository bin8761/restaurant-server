server:
  port: ${PORT:3000}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowCredentials: true
            allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        - RemoveRequestHeader=X-Internal-Call
        - RemoveRequestHeader=X-Service-Token
        - RemoveRequestHeader=Origin
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:3005}
          predicates:
            - Path=/api/users/**

        - id: user-service-roles
          uri: ${USER_SERVICE_URL:http://localhost:3005}
          predicates:
            - Path=/api/roles/**
        
        - id: menu-service
          uri: ${MENU_SERVICE_URL:http://localhost:3002}
          predicates:
            - Path=/api/menu/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:3003}
          predicates:
            - Path=/api/orders/**

        - id: table-service
          uri: ${TABLE_SERVICE_URL:http://localhost:3011}
          predicates:
            - Path=/api/tables/**

        - id: kitchen-service
          uri: ${KITCHEN_SERVICE_URL:http://localhost:3004}
          predicates:
            - Path=/api/kitchen/**

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:3006}
          predicates:
            - Path=/api/inventory/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:3008}
          predicates:
            - Path=/api/payments/**

        - id: image-service
          uri: ${IMAGE_SERVICE_URL:http://localhost:3007}
          predicates:
            - Path=/api/images/**
          filters:
            - AddResponseHeader=Access-Control-Allow-Origin, *
            - AddResponseHeader=Access-Control-Allow-Methods, GET, OPTIONS
            - AddResponseHeader=Access-Control-Allow-Headers, *

        - id: payment-websocket
          uri: ${PAYMENT_SERVICE_URL:http://localhost:3008}
          predicates:
            - Path=/ws/payment/**

        - id: kitchen-websocket
          uri: ${KITCHEN_SERVICE_URL:http://localhost:3004}
          predicates:
            - Path=/ws/kitchen/**

        - id: order-websocket
          uri: ${ORDER_SERVICE_URL:http://localhost:3003}
          predicates:
            - Path=/ws/order/**


