server:
  port: ${PORT:3002}

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: menu-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/menudb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

services:
  inventory: ${INVENTORY_SERVICE_URL:http://localhost:3006}

